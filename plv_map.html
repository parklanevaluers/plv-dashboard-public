.legend .row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.legend .dot { width:12px; height:12px; border-radius:50%; display:inline-block; border:1.5px solid white; box-shadow:0 0 0 1px rgba(0,0,0,0.2); }

.popup-meta { font-size:11px; line-height:1.5; color:#444; }
.popup-meta strong { color:#222; }
.popup-meta .badge { display:inline-block; padding:1px 6px; border-radius:8px; color:white; font-size:10px; font-weight:500; }

const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([53.345504, -2.154207], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Our base marker
const baseIcon = L.divIcon({ className:'', html:'<div style="font-size:20px;line-height:1;">📍</div>', iconSize:[24,24], iconAnchor:[12,22] });
L.marker([53.345504, -2.154207], { icon: baseIcon })
 .bindTooltip('Park Lane Valuers HQ — SK7 1QQ', { permanent:false }).addTo(map);

function colourFor(comp) {
  if (comp === 'Park Lane Valuers') return '#2e5cb8';
  if (comp === 'WeBuyVintage') return '#c0392b';
  if (comp === 'Vintage & Collectables') return '#2e8b57';
  return '#5d6580';
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}
function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let layer = L.layerGroup().addTo(map);
function render() {
  layer.clearLayers();
  const showPLV = document.getElementById('show-plv').checked;
  const showWBV = document.getElementById('show-wbv').checked;
  const showVAC = document.getElementById('show-vac').checked;
  const range = document.getElementById('date-range').value;
  const today = new Date(); today.setHours(0,0,0,0);
  let from = null, to = null;
  if (range === 'next4') { from = today; to = new Date(today.getTime() + 28*86400000); }
  else if (range === 'next8') { from = today; to = new Date(today.getTime() + 56*86400000); }
  else if (range === 'next180') { from = today; to = new Date(today.getTime() + 180*86400000); }
  else if (range === 'past90') { from = new Date(today.getTime() - 90*86400000); to = today; }

  // First, apply filters and aggregate by venue (postcode-keyed, or lat,lng-keyed)
  const groups = new Map();
  EVENTS.forEach(e => {
    if (e.comp === 'Park Lane Valuers' && !showPLV) return;
    if (e.comp === 'WeBuyVintage' && !showWBV) return;
    if (e.comp === 'Vintage & Collectables' && !showVAC) return;
    if (from || to) {
      const d = e.date ? new Date(e.date) : null;
      if (!d) return;
      if (from && d < from) return;
      if (to && d > to) return;
    }
    // Group key: prefer normalised postcode, fall back to rounded lat/lng
    const pcKey = (e.pc || '').replace(/\s+/g,'').toUpperCase();
    const key = (e.comp + '|') + (pcKey || (Math.round(e.lat*1000)/1000)+','+(Math.round(e.lng*1000)/1000));
    if (!groups.has(key)) groups.set(key, { comp: e.comp, name: e.name, pc: e.pc, town: e.town, lat: e.lat, lng: e.lng, events: [] });
    groups.get(key).events.push(e);
  });

  const bounds = [];
  groups.forEach(g => {
    const col = colourFor(g.comp);
    const n = g.events.length;
    // Marker size scales with visit count, capped
    const baseR = g.comp==='Park Lane Valuers' ? 8 : 7;
    const r = Math.min(baseR + Math.max(0, (n-1)) * 1.2, 16);
    const m = L.circleMarker([g.lat, g.lng], {
      radius: r,
      fillColor: col,
      color: 'white',
      weight: 1.8,
      opacity: 1,
      fillOpacity: 0.88
    });
    // Sort dates most recent first
    const sortedEvents = g.events.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const dateList = sortedEvents.map(e =>
      '<div style="font-size:11px; padding:1px 0;">' +
      '<strong>' + fmtDate(e.date) + '</strong>' +
      (e.clash_our ? ' <span style="color:#a32d2d;">(clash: ' + esc(e.clash_our) + ')</span>' : '') +
      '</div>'
    ).join('');
    const popup = '<div class="popup-ttl">' + esc(g.name || '(no name)') + '</div>' +
                  '<div class="popup-meta">' +
                    '<span class="badge" style="background:' + col + '">' + esc(g.comp) + '</span>' +
                    (n>1 ? ' <span style="background:#333;color:white;padding:1px 6px;border-radius:8px;font-size:10px;">' + n + ' visits</span>' : '') +
                    '<br>' + esc(g.town || '') + (g.pc ? ' &middot; ' + esc(g.pc) : '') +
                    '<div style="margin-top:6px; padding-top:4px; border-top:1px solid #eee;">' + dateList + '</div>' +
                  '</div>';
    m.bindPopup(popup, { maxHeight: 320 });
    m.bindTooltip(esc(g.comp) + (n>1 ? ' &middot; <strong>' + n + ' visits</strong>' : ' &middot; ' + fmtDate(g.events[0].date)) + '<br>' + esc(g.name || '') + (g.town ? ' &middot; ' + esc(g.town) : ''), { sticky:true });
    m.addTo(layer);
    bounds.push([g.lat, g.lng]);
  });
  return bounds;
}

let lastBounds = render();
document.getElementById('show-plv').onchange = () => { lastBounds = render(); };
document.getElementById('show-wbv').onchange = () => { lastBounds = render(); };
document.getElementById('show-vac').onchange = () => { lastBounds = render(); };
document.getElementById('date-range').onchange = () => { lastBounds = render(); };
document.getElementById('fit').onclick = () => {
  if (lastBounds.length) map.fitBounds(lastBounds, { padding:[40,40], maxZoom: 11 });
};

const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML =
    '<div class="row"><span class="dot" style="background:#2e5cb8"></span>Park Lane Valuers (us)</div>' +
    '<div class="row"><span class="dot" style="background:#c0392b"></span>WeBuyVintage</div>' +
    '<div class="row"><span class="dot" style="background:#2e8b57"></span>Vintage &amp; Collectables</div>';
  return div;
};
legend.addTo(map);
